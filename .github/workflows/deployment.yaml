name: CI/CD Pipeline with Full Security Scanning

on:
  push:
    branches: ["main"]

jobs:

# =========================
# ✅ BUILD STAGE
# =========================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5   # ✅ UPDATED (v4 → v5)

      # ✅ OPTIONAL (recommended for stability)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # ✅ ADDED (locks Node version for npm)

      # ---------- FRONTEND ----------
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      # ---------- BACKEND ----------
      - name: Setup Java
        uses: actions/setup-java@v5   # ✅ UPDATED (v4 → v5)
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Backend
        run: |
          cd backend
          mvn clean install -DskipTests

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v5   # ✅ UPDATED (v4 → v5)
        with:
          name: app-build
          path: .

# =========================
# ✅ SECURITY STAGE
# =========================
  security:
    name: Security & Compliance  
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5   # ✅ UPDATED (v4 → v5)

      # ✅ OPTIONAL (recommended)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # ✅ ADDED

      # =========================
      # ✅ SECRET SCANNING (GITLEAKS)
      # =========================
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --redact

      # =========================
      # ✅ SAST (CODEQL - Java + JS)
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v5   # ✅ UPDATED (v4 → v5)
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java,javascript

      # Build backend for CodeQL
      - name: Build Backend
        run: |
          cd backend
          mvn clean install -DskipTests

      # Build frontend (helps JS analysis)
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

        
      # ✅ Remove broken JAVA_HOME (IMPORTANT FIX)
      - name: Clear JAVA_HOME for Docker
        run: echo "JAVA_HOME=" >> $GITHUB_ENV


      # =========================
      # ✅ DEPENDENCY SCAN
      # ========================

      # ✅ Verify Java (optional but helpful)
      - name: Verify Java
        run: java -version

      # ✅ Dependency Check (FINAL FIX)
      
      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@v3
        with:
          project: "my-app"
          path: "."
          format: "HTML"
          out: "reports"
          args: "--failOnCVSS 7 --noupdate"
        env:
          JAVA_HOME: ""


      # =========================
      # ✅ RUN BACKEND (IMPROVED)
      # =========================
      - name: Start Backend
        run: |
          cd backend
          nohup mvn spring-boot:run > backend.log 2>&1 &   # ✅ UPDATED (better background handling)
          sleep 25

      # =========================
      # ✅ RUN FRONTEND (IMPROVED)
      # =========================
      - name: Start Frontend
        run: |
          cd frontend
          npm install
          nohup PORT=3000 npm start > frontend.log 2>&1 &   # ✅ UPDATED
          sleep 30

      # =========================
      # ✅ DAST (ZAP)
      # =========================
      - name: Run OWASP ZAP Scan (UI)
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: "http://localhost:3000"
          fail_action: true

      - name: Run OWASP ZAP Scan (API)
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: "http://localhost:8080"
          fail_action: false

      # =========================
      # ✅ UPLOAD REPORTS
      # =========================
      - name: Upload Security Reports
        uses: actions/upload-artifact@v5   # ✅ UPDATED (v4 → v5)
        with:
          name: security-reports
          path: |
            report_html.html
            reports/