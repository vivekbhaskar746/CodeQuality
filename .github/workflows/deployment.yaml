name: CI/CD Pipeline with Full Security Scanning

on:
  push:
    branches: ["main"]


permissions:
  contents: read
  issues: write 


jobs:

# =========================
# ✅ BUILD STAGE
# =========================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5   # ✅ UPDATED (v4 → v5)

      # ✅ OPTIONAL (recommended for stability)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # ✅ ADDED (locks Node version for npm)

      # ---------- FRONTEND ----------
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      # ---------- BACKEND ----------
      - name: Setup Java
        uses: actions/setup-java@v5   # ✅ UPDATED (v4 → v5)
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Backend
        run: |
          cd backend
          mvn clean install -DskipTests

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v5   # ✅ UPDATED (v4 → v5)
        with:
          name: app-build
          path: .

# =========================
# ✅ SECURITY STAGE
# =========================
  security:
    name: Security & Compliance  
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5   # ✅ UPDATED (v4 → v5)

      # ✅ OPTIONAL (recommended)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # ✅ ADDED

      # =========================
      # ✅ SECRET SCANNING (GITLEAKS)
      # =========================
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --redact

      # =========================
      # ✅ SAST (CODEQL - Java + JS)
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v5   # ✅ UPDATED (v4 → v5)
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java,javascript

      # Build backend for CodeQL
      - name: Build Backend
        run: |
          cd backend
          mvn clean install -DskipTests

      # Build frontend (helps JS analysis)
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v4


      # =========================
      # ✅ DEPENDENCY SCAN
      # ========================

      # ✅ Verify Java (optional but helpful)
      # - name: Verify Java
      #   run: |
      #     echo "JAVA_HOME=$JAVA_HOME"
      #     java -version
      #     which java

      # # ✅ Dependency Check (FINAL FIX)
      
      # - name: Run Dependency Check
      #   uses: dependency-check/Dependency-Check_Action@1.1.0
      #   with:
      #     project: "backend"
      #     path: "./backend"
      #     format: "HTML"
      #     out: "reports"
      #     args: "--failOnCVSS 7 --noupdate"


    #  # =========================
    #   # ✅ RUN BACKEND
    #   # =========================
    #   - name: Start Backend
    #     run: |
    #       cd backend
    #       nohup mvn spring-boot:run > backend.log 2>&1 &
    #       sleep 30

    #   # =========================
    #   # ✅ VERIFY BACKEND
    #   # =========================
    #   - name: Check Backend
    #     run: |
    #       curl -f http://localhost:8080 || (echo "Backend not running" && exit 1)

      # =========================
      # ✅ RUN FRONTEND
      # =========================
      - name: Start Frontend
        run: |
          cd frontend
          npm install
          nohup npm start -- --port 3000 > frontend.log 2>&1 &
          sleep 40

      # =========================
      # ✅ VERIFY FRONTEND
      # =========================
      - name: Check Frontend
        run: |
          curl -f http://localhost:3000 || (echo "Frontend not running" && exit 1)

      # =========================
      # ✅ FIX PERMISSIONS (CRITICAL ✅)
      # =========================
      - name: Fix workspace permission
        run: |
          chmod -R 777 $GITHUB_WORKSPACE

      # =========================
      # ✅ DAST (ZAP UI)
      # =========================
      
      -  name: Run OWASP ZAP Scan (CLI)
         run: |
            docker run --rm \
              -v $(pwd):/zap/wrk/:rw \
              --network=host \
              ghcr.io/zaproxy/zaproxy:stable \
              zap-baseline.py \
              -t http://localhost:3000 \
              -J report_json.json \
              -w report_md.md \
              -r report_html.html

      # # =========================
      # # ✅ DAST (ZAP API)
      # # =========================
      # - name: Run OWASP ZAP Scan (API)
      #   uses: zaproxy/action-baseline@v0.10.0
      #   with:
      #     target: "http://localhost:8080"
      #     fail_action: false
      #     cmd_options: "-z '-config api.disablekey=true'"
    

    # =========================
      # ✅ Upload All Security Reports
      # =========================
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            *.html
            *.json
            *.md
            reports/