name: CI/CD Pipeline with Full Security Scanning

on:
  push:
    branches: ["main"]

# ✅ Global permissions (required for issues + security scans)
permissions:
  contents: read
  issues: write

jobs:

# ==================================================
# 🏗️ BUILD STAGE – Compile & Package Application
# ==================================================
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v5

      # ✅ Step 2: Setup Node (for frontend build)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ✅ Step 3: Build Frontend
      - name: Install & Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # ✅ Step 4: Setup Java (for backend build)
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ Step 5: Build Backend
      - name: Build Backend
        run: |
          cd backend
          mvn clean install -DskipTests

      # ✅ Step 6: Upload build artifacts for next stage reuse
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: app-build
          path: .

# ==================================================
# 🔐 SECURITY STAGE – DevSecOps Scanning Layer
# ==================================================
  security:
    name: Security & Compliance
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      # ✅ Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v5

      # ✅ Step 2: Setup Node (for any frontend analysis)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'




# ==================================================
# 🔑 SECRET SCANNING – Detect hardcoded secrets
# ==================================================
      - name: Run Gitleaks (Secret Scan)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --redact






# ==================================================
# 🔍 SAST – Static Code Analysis (CodeQL)
# ==================================================
      - name: Setup Java for CodeQL
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java,javascript



      
      - name: Build Backend (CodeQL)
        run: |
          cd backend
          mvn clean install -DskipTests

      - name: Build Frontend (CodeQL)
        run: |
          cd frontend
          npm install
          npm run build

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v4






# ==================================================
# 📦 OPTIONAL – DEPENDENCY SCANNING (Currently Disabled)
# ==================================================


      
      - name: Verify API Key (masked)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
            echo "API Key Length: ${#NVD_API_KEY}"  

      # - name: Show Dependencycheck help
      #   run: |
      #     ./dependency-check/bin/dependency-check.sh --advancedHelp | grep -i nvd



      - name: Run Dependency Check (CLI)
        env: 
          NVD_API_KEY: ${{secrets.NVD_API_KEY}}
        run: |
          wget https://github.com/jeremylong/DependencyCheck/releases/download/v12.1.0/dependency-check-12.1.0-release.zip
          unzip dependency-check-12.1.0-release.zip

          
          ./dependency-check/bin/dependency-check.sh \
                --project "backend" \
                --scan "./backend" \
                --format ALL \
                --out "./reports" \
                --noupdate \
                --failOnCVSS 7 || true

#--nvdApiKey "$NVD_API_KEY" \


          
      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: reports/
      



# ==================================================
# 🚀 APPLICATION STARTUP (FOR DAST SCAN)
# ==================================================


      # 🔸 OPTIONAL: Backend startup (enable when DB configured)
      # - name: Start Backend
      #   run: |
      #     cd backend
      #     nohup mvn spring-boot:run > backend.log 2>&1 &
      #     sleep 30

      # - name: Verify Backend
      #   run: |
      #     curl -f http://localhost:8080 || (echo "Backend not running" && exit 1)
      



      # ✅ Start Frontend (required for ZAP runtime scan)
      - name: Start Frontend
        run: |
          cd frontend
          npm install
          nohup npm start -- --port 3000 > frontend.log 2>&1 &
          sleep 40

      # ✅ Verify frontend is accessible
      - name: Verify Frontend
        run: |
          curl -f http://localhost:3000 || (echo "Frontend not running" && exit 1)





# ==================================================
# 🔐 DAST – OWASP ZAP (Runtime Security Scan)
# ==================================================

      - name: check workspace permissions
        run: |
            pwd
            ls -ld
            ls -la
            chmod -R 777 .
      
      - name: Run OWASP ZAP Scan (CLI)
        run: |
          docker run --rm \
            -u root \
            -v $(pwd):/zap/wrk/:rw \
            --network=host \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:3000 \
            -m 5 \
            -I \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html 

      - name: Debug ZAP Output
        run: |
            echo "------workspace files-------"
            find . -type f | sort

            echo "-----Reports Folder-----"
            ls -la reports || true      

      # - name: Check generated reports
      #   run: |
      #       echo "==== ROOT FILES ===="
      #       ls -la
      #       echo "==== REPORT FILES ===="
      #       ls -la report* || true
      #       echo "==== REPORTS FOLDER ===="
      #       ls -la reports || true



# ==================================================
# 📊 REPORT STORAGE – Downloadable Security Reports
# ==================================================
      - name: Debug reports
        run: |
           echo "------current dir-----"
           pwd
           echo "-----All Files-----"
           find . -type f 
           echo "------Report Files------"
           find . -name "*.html"
           find . -name "*.json"
           find . -name "*.md"
      
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
               report_html.html
               report_json.json
               report_md.md
              
            


























